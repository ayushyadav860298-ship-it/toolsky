<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator - Free Online Tool | ToolSky</title>
    <meta name="description" content="Free online QR code generator. Create custom QR codes for URLs, text, contacts, and more. Download as PNG or SVG.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="ToolSky Logo" onerror="this.src='https://via.placeholder.com/150x50?text=ToolSky'">
            </a>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../about.html">About</a></li>
                <li><a href="../contact.html">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="tool-header">
            <div class="container" data-aos="fade-up">
                <h1><i class="fas fa-qrcode"></i> QR Generator</h1>
                <p>Create custom QR codes instantly</p>
            </div>
        </section>

        <section class="tool-content container">
            <div class="tool-container" data-aos="fade-up">
                <div class="tool-input-area">
                    <div class="input-group">
                        <label for="qrText">Enter text or URL</label>
                        <input type="text" id="qrText" placeholder="https://example.com or any text">
                    </div>
                    
                    <div class="qr-options">
                        <div class="input-group">
                            <label for="qrSize">Size (px)</label>
                            <select id="qrSize">
                                <option value="150">150 x 150</option>
                                <option value="200" selected>200 x 200</option>
                                <option value="250">250 x 250</option>
                                <option value="300">300 x 300</option>
                            </select>
                        </div>
                        
                        <div class="input-group">
                            <label for="qrColor">Color</label>
                            <input type="color" id="qrColor" value="#000000">
                        </div>
                        
                        <div class="input-group">
                            <label for="qrBgColor">Background</label>
                            <input type="color" id="qrBgColor" value="#ffffff">
                        </div>
                    </div>
                    
                    <div class="qr-preview" id="qrPreview">
                        <div class="qr-placeholder">
                            <i class="fas fa-qrcode"></i>
                            <p>Your QR code will appear here</p>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" id="qrGenerateBtn">Generate QR Code</button>
                    <button class="btn btn-secondary" id="qrDownloadBtn" style="display: none;">Download QR Code</button>
                </div>
            </div>

            <!-- AdSense Placeholder -->
            <div class="ad-container">
                <div class="ad-placeholder">
                    <p>Advertisement</p>
                    <div class="ad-slot">728x90 AdSense Code Here</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="../assets/images/logo.png" alt="ToolSky" onerror="this.src='https://via.placeholder.com/120x40?text=ToolSky'">
                    <p>Premium online tools for everyone</p>
                </div>
                <div class="footer-links">
                    <h4>Legal</h4>
                    <ul>
                        <li><a href="../privacy.html">Privacy Policy</a></li>
                        <li><a href="../disclaimer.html">Disclaimer</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ToolSky. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
