<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - Free Online Tool | ToolSky</title>
    <meta name="description" content="Free online image resizer. Resize any image to exact dimensions instantly. Maintain quality while changing size. No registration required.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="ToolSky Logo" onerror="this.src='https://via.placeholder.com/150x50?text=ToolSky'">
            </a>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../about.html">About</a></li>
                <li><a href="../contact.html">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="tool-header">
            <div class="container" data-aos="fade-up">
                <h1><i class="fas fa-expand-arrows-alt"></i> Image Resizer</h1>
                <p>Resize any image to your desired dimensions</p>
            </div>
        </section>

        <section class="tool-content container">
            <div class="tool-container" data-aos="fade-up">
                <div class="tool-input-area">
                    <div class="upload-area" id="imageResizeUpload">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click or drag image to upload</p>
                        <input type="file" id="imageInput" accept="image/*" hidden>
                    </div>
                    
                    <div class="resize-controls" id="resizeControls" style="display: none;">
                        <div class="preview-container">
                            <img id="imagePreview" alt="Preview">
                        </div>
                        
                        <div class="dimension-inputs">
                            <div class="input-group">
                                <label>Width (px)</label>
                                <input type="number" id="widthInput" placeholder="Width">
                            </div>
                            <div class="input-group">
                                <label>Height (px)</label>
                                <input type="number" id="heightInput" placeholder="Height">
                            </div>
                            <div class="checkbox-group">
                                <label>
                                    <input type="checkbox" id="maintainAspect" checked> Maintain aspect ratio
                                </label>
                            </div>
                        </div>
                        
                        <button class="btn btn-primary" id="resizeBtn">Resize Image</button>
                    </div>
                </div>
            </div>

            <!-- AdSense Placeholder -->
            <div class="ad-container">
                <div class="ad-placeholder">
                    <p>Advertisement</p>
                    <div class="ad-slot">728x90 AdSense Code Here</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="../assets/images/logo.png" alt="ToolSky" onerror="this.src='https://via.placeholder.com/120x40?text=ToolSky'">
                    <p>Premium online tools for everyone</p>
                </div>
                <div class="footer-links">
                    <h4>Legal</h4>
                    <ul>
                        <li><a href="../privacy.html">Privacy Policy</a></li>
                        <li><a href="../disclaimer.html">Disclaimer</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ToolSky. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
